<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <button class="hamburger" id="hamburger" aria-label="Menu">&#9776;</button>
        <img src="logo-small.png" alt="Galeria" class="logo">
        <div class="search-bar">
            <input type="text" id="search" placeholder="Cercar..." autocomplete="off">
        </div>
    </header>

    <aside class="sidebar" id="sidebar">
        <h2>Categories</h2>
        <ul id="categories"></ul>
    </aside>

    <main class="gallery" id="gallery"></main>

    <div class="toast" id="toast">Copiat!</div>

    <script src="app.js" type="module"></script>
</body>
</html>
